# SQLite. Versions 3.8.0 and up are supported.
#
# Primary DB holds app data (documents, future tags, FTS tables).
# Queue DB holds Solid Queue's job tables — kept separate so heavy job churn
# (polling, claims, retries) doesn't bloat or contend with the primary DB.
# Schema for the queue DB lives in db/queue_schema.rb.

default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
    schema_dump: queue_schema.rb

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
    schema_dump: queue_schema.rb

# SQLite3 writes its data on the local filesystem, as such it requires
# persistent disks. If you are deploying as a Docker container, mount a
# volume at /app/storage so both databases survive restarts.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
    schema_dump: queue_schema.rb
